parameters:
  - name: appName
    type: string
  - name: resourceGroup
    type: string

jobs:
  - job: Deploy_${{ replace(parameters.appName, '-', '_') }}
    displayName: 'Deploy ${{ parameters.appName }}'
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - task: AzureCLI@2
        displayName: 'Create Resource Group'
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az group create --name ${{ parameters.resourceGroup }} --location $(location)

      - task: AzureCLI@2
        displayName: 'Deploy Infrastructure'
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            outputs=$(az deployment group create \
              --resource-group ${{ parameters.resourceGroup }} \
              --template-file ${{ parameters.appName }}/infra/main.bicep \
              --parameters appName=${{ parameters.appName }} \
              --query 'properties.outputs' -o json)
            echo "##vso[task.setvariable variable=acrName]$(echo $outputs | jq -r '.acrName.value')"
            echo "##vso[task.setvariable variable=appServiceName]$(echo $outputs | jq -r '.appServiceName.value')"

      - task: AzureCLI@2
        displayName: 'Build and Push to ACR'
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az acr build \
              --registry $(acrName) \
              --image ${{ parameters.appName }}:$(Build.BuildId) \
              --image ${{ parameters.appName }}:latest \
              ${{ parameters.appName }}
