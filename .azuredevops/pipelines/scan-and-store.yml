schedules:
  - cron: '0 6 * * 1'
    displayName: Weekly scan and store
    branches:
      include:
        - main

trigger: none

variables:
  - template: variables/common.yml

stages:
  - stage: ScanAndStore
    displayName: 'Scan All Apps & Store Results'
    jobs:
      - job: ScanAndStore
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
          - task: AzureCLI@2
            displayName: 'Run scan-and-store'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: pscore
              scriptLocation: scriptPath
              scriptPath: scripts/scan-and-store.ps1
              arguments: >
                -StorageAccountName $(storageAccountName)
                -ContainerName apm-security-results
